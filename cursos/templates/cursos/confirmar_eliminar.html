{% extends 'cursos/base.html' %}

{% block title %}Eliminar Curso{% endblock %}

{% block content %}
<div class="mb-3">
    <a href="{% url 'cursos:detalle' curso.pk %}" class="btn btn-outline-secondary btn-sm">← Volver</a>
</div>

<div class="card shadow-sm border-danger" style="max-width: 500px; margin: auto;">
    <div class="card-header bg-danger text-white">
        <h2 class="mb-0">Eliminar Curso</h2>
    </div>
    <div class="card-body">
        <p>¿Estás seguro de que deseas eliminar el curso <strong>{{ curso.nombre }}</strong>?</p>
        <p class="text-muted">Esta acción no se puede deshacer.</p>
        <form method="post">
            {% csrf_token %}
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-danger">Sí, eliminar</button>
                <a href="{% url 'cursos:detalle' curso.pk %}" class="btn btn-outline-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
